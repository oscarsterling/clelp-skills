# CI for the clelp-mcp-server subdirectory only
name: clelp-mcp-server CI

on:
  push:
    paths:
      - 'clelp-mcp-server/**'
      - '.github/workflows/clelp-mcp-server-ci.yml'
  pull_request:
    paths:
      - 'clelp-mcp-server/**'
      - '.github/workflows/clelp-mcp-server-ci.yml'

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clelp-mcp-server
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: clelp-mcp-server/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
